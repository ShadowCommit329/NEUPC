<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Subtle shimmer line -->
  <rect width="800" height="450" fill="url(#pulse)" opacity="0.5"/>

  <!-- Grid dots pattern -->
  <g opacity="0.07">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#a5b4fc"/>
    </pattern>
    <rect width="800" height="450" fill="url(#dots)"/>
  </g>

  <!-- Central icon group -->
  <g transform="translate(400,200)" opacity="0.9">
    <!-- Outer glow circle -->
    <circle r="70" fill="#6366f1" opacity="0.08"/>
    <circle r="55" fill="#6366f1" opacity="0.1"/>
    <!-- Icon border circle -->
    <circle r="44" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>

    <!-- Image/photo icon (simplified) -->
    <!-- Camera body -->
    <rect x="-22" y="-16" width="44" height="32" rx="4" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.8"/>
    <!-- Camera lens -->
    <circle cx="0" cy="0" r="10" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.8"/>
    <circle cx="0" cy="0" r="5" fill="#6366f1" opacity="0.4"/>
    <!-- Mountain / landscape lines inside -->
    <polyline points="-14,10 -6,-2 2,6 10,-4 18,10" fill="none" stroke="#818cf8" stroke-width="1.5" stroke-linejoin="round" opacity="0.6"/>
    <!-- Small viewfinder bump -->
    <rect x="-6" y="-20" width="12" height="5" rx="2" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Text -->
  <text x="400" y="278" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#a5b4fc" text-anchor="middle" opacity="0.7" letter-spacing="2" font-weight="500">NO IMAGE</text>
</svg>
