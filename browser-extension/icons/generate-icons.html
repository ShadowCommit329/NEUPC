<!doctype html>
<html>
  <head>
    <title>Icon Generator</title>
  </head>
  <body>
    <h2>NeuPC Extension Icon Generator</h2>
    <p>This page generates the required PNG icons for the browser extension.</p>

    <canvas
      id="canvas16"
      width="16"
      height="16"
      style="border: 1px solid black; margin: 10px"
    ></canvas>
    <canvas
      id="canvas48"
      width="48"
      height="48"
      style="border: 1px solid black; margin: 10px"
    ></canvas>
    <canvas
      id="canvas128"
      width="128"
      height="128"
      style="border: 1px solid black; margin: 10px"
    ></canvas>

    <div style="margin-top: 20px">
      <button onclick="downloadIcons()">Download All Icons</button>
    </div>

    <script>
      function drawIcon(canvas) {
        const ctx = canvas.getContext('2d');
        const size = canvas.width;

        // Create gradient background
        const gradient = ctx.createLinearGradient(0, 0, size, size);
        gradient.addColorStop(0, '#667eea');
        gradient.addColorStop(1, '#764ba2');

        // Draw rounded rectangle background
        const radius = size * 0.2;
        ctx.beginPath();
        ctx.moveTo(radius, 0);
        ctx.lineTo(size - radius, 0);
        ctx.quadraticCurveTo(size, 0, size, radius);
        ctx.lineTo(size, size - radius);
        ctx.quadraticCurveTo(size, size, size - radius, size);
        ctx.lineTo(radius, size);
        ctx.quadraticCurveTo(0, size, 0, size - radius);
        ctx.lineTo(0, radius);
        ctx.quadraticCurveTo(0, 0, radius, 0);
        ctx.closePath();
        ctx.fillStyle = gradient;
        ctx.fill();

        // Draw "N" letter
        ctx.fillStyle = 'white';
        ctx.font = `bold ${size * 0.6}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('N', size / 2, size / 2 + size * 0.05);

        // Draw checkmark badge
        const badgeRadius = size * 0.15;
        const badgeX = size * 0.8;
        const badgeY = size * 0.2;

        ctx.beginPath();
        ctx.arc(badgeX, badgeY, badgeRadius, 0, Math.PI * 2);
        ctx.fillStyle = '#10b981';
        ctx.fill();

        // Draw checkmark
        ctx.strokeStyle = 'white';
        ctx.lineWidth = size * 0.03;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(badgeX - badgeRadius * 0.4, badgeY);
        ctx.lineTo(badgeX - badgeRadius * 0.1, badgeY + badgeRadius * 0.3);
        ctx.lineTo(badgeX + badgeRadius * 0.5, badgeY - badgeRadius * 0.4);
        ctx.stroke();
      }

      // Draw icons on all canvases
      drawIcon(document.getElementById('canvas16'));
      drawIcon(document.getElementById('canvas48'));
      drawIcon(document.getElementById('canvas128'));

      function downloadIcons() {
        const sizes = [16, 48, 128];
        sizes.forEach((size) => {
          const canvas = document.getElementById(`canvas${size}`);
          const link = document.createElement('a');
          link.download = `icon${size}.png`;
          link.href = canvas.toDataURL();
          link.click();
        });
        alert(
          'Icons downloaded! Move them to the browser-extension/icons/ folder.'
        );
      }
    </script>
  </body>
</html>
